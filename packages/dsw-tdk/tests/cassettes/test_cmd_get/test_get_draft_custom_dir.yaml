        Report\",\"project\":null,\"projectUuid\":null,\"readme\":\"# Questionnaire
        Report\\n\\nThis generic *default* template for [Data Stewardship Wizard](https://ds-wizard.org)
        (DSW) directly transforms answers from a questionnaire into a document while
        maintaining the structure. It is not tied to any knowledge model and is included
        by default in every DSW instance.\\n\\n\\n## Usage \\n\\nThis template is
        available through [DSW Registry](https://registry.ds-wizard.org/templates).\\n\\n\\n##
        Issues and Contributing\\n\\nThis document template for DSW is available as
        open-source via GitHub Repository [ds-wizard/questionnaire-report-template](https://github.com/ds-wizard/questionnaire-report-template),
        you can [report issues](https://github.com/ds-wizard/questionnaire-report-template/issues)
        there and fork it for customisations or contributions.\\n\\n\\n### Contributors\\n\\n*
        **Marek Such\xE1nek** <[marek.suchanek@ds-wizard.org](mailto:marek.suchanek@ds-wizard.org)>\\n
        \ * ORCID: [0000-0001-7525-9218](https://orcid.org/0000-0001-7525-9218)\\n
        \ * GitHub: [@MarekSuchanek](https://github.com/MarekSuchanek)\\n* **Kry\u0161tof
        Komanec** <[krystof.komanec@ds-wizard.org](mailto:krystof.komanec@ds-wizard.org)>\\n
        \ * ORCID: [0000-0003-3856-1682](https://orcid.org/0000-0003-3856-1682)\\n
        \ * GitHub: [@krystofkomanec](https://github.com/krystofkomanec)\\n* **Jana
        Mart\xEDnkov\xE1** <[jana.martinkova@ds-wizard.org](mailto:jana.martinkova@ds-wizard.org)>\\n
        \ * ORCID: [0000-0001-8575-6533](https://orcid.org/0000-0001-8575-6533/)\\n
        \ * GitHub: [@jmartinkova](https://github.com/jmartinkova)\\n\\n\\n## Changelog\\n\\n###
        2.16.1\\n\\n- Adjusted to template metamodel version 17.1 (released in DSW
        4.26.0)\\n\\n### 2.16.0\\n\\n- Adjusted to template metamodel version 17.0
        (released in DSW 4.22.0)\\n\\n### 2.15.0\\n\\n- Remove External Resource Pages
        listing\\n- Improve URL to External Resource Page for LateX\\n- Add URL to
        External Resource Page for PDF/HTML, Markdown, Word\\n\\n### 2.14.1\\n\\n-
        Fixed LaTeX rendering with references\\n\\n### 2.14.0\\n\\n- Adjusted to template
        metamodel version 16 (released in DSW 4.13.0)\\n\\n### 2.13.0\\n\\n- Adjusted
        to template metamodel version 15 (released in DSW 4.12.0)\\n- Fixed experts\\n-
        Improved reply to value questions\\n- Improved resource pages\\n- Fixed check
        icon ItemSelectQuestion\\n- Fixed text after img for resource pages\\n- Fix
        newline in resource pages for PDF/HTML\\n\\n### 2.12.0\\n\\n- Adjusted to
        template metamodel version 14 (released in DSW 4.10.0)\\n- Added support for
        item select question\\n- Added support for resource collections and pages
        (resource page references)\\n\\n### 2.11.1\\n\\n- Fixed nested bullet points
        would display unwanted characters\\n\\n### 2.11.0\\n\\n- Adjusted to template
        metamodel version 13 (released in DSW 4.3.0)\\n\\n### 2.10.1\\n\\n- Fixed
        broken images in Word\\n\\n### 2.10.0\\n\\n- Adjusted to template metamodel
        version 12 (released in DSW 4.1.0)\\n- Integrations should not have the link
        inside the item template (item URL will not be generated)\\n\\n### 2.9.0\\n\\n-
        Switched from `wkhtmltopdf` to `weasyprint` for PDF\\n- Improved styling for
        PDF and HTML\\n\\n### 2.8.0\\n\\n- Adjusted to template metamodel version
        11 (released in DSW 3.20.0)\\n- Added versions overview / change tracker table\\n\\n###
        2.7.1\\n\\n- Fixed Markdown rendering for integration question reply\\n\\n###
        2.7.0\\n\\n- Adjusted to template metamodel version 10 (released in DSW 3.12.0)\\n\\n###
        2.6.0\\n\\n- Adjusted to template metamodel version 9 (released in DSW 3.10.0)\\n\\n###
