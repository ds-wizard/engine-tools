        {{dc.pkg.version}} (<span class=\"package-id\"><span class=\"organization-id\">{{dc.pkg.org_id}}</span>:<span
        class=\"km-id\">{{dc.pkg.km_id}}</span>:<span class=\"version\">{{dc.pkg.version}}</span></span>)</td>\n      </tr>\n      {%
        for version in dc.qtn.versions if version.uuid == dc.qtn.version %}\n      <tr>\n        <th>Version</th>\n        <td>{{version.name}}
        ({{ version.created_at|datetime_format(\"%d %b %Y %H:%M:%S\") }} UTC)</td>\n      </tr>\n      {%
        endfor %}\n      {% if dc.current_phase %}\n      <tr>\n        <th>Project
        Phase</th>\n        <td>{{dc.current_phase.title}}</td>\n      </tr>\n      {%
        endif %}\n      {% if dc.qtn.project_tags|length > 0 %}\n      <tr>\n        <th>Project
        Tags</th>\n        <td class=\"tags-row\">{% for tag in dc.qtn.project_tags
        %}<span class=\"tag project-tag\">{{ tag }}</span> {% endfor %}</td>\n      </tr>\n      {%
        endif %}\n      {% if dc.qtn.description %}\n      <tr>\n        <th>Description</th>\n        <td>{{
        dc.qtn.description }}</td>\n      </tr>\n      {% endif %}\n      <tr>\n        <th>Created
        at</th>\n        <td>{{ dc.doc.created_at|datetime_format(\"%d %b %Y\") }}</td>\n      </tr>\n    </table>\n    <p
        class=\"tool-info\">\n      Report generated by {{ dc.config.service_name
        }} &lt;<a href=\"{{ dc.config.service_url }}\" target=\"_blank\">{{ dc.config.service_domain_name
        }}</a>&gt;\n      <br/>\n      <br/>\n      <img\n        src=\"{{ dc.config.logo_url
        }}\"\n        alt=\"Logo\"\n        style=\"height: 8mm; width: auto;\"\n      />\n    </p>\n  </header>\n{%-
        endmacro -%}\n{%- macro renderVersionsOverview() -%}\n  <div id=\"versions\">\n    <table>\n      <thead>\n        <tr>\n          <th>Version</th>\n          <th>Date</th>\n          <th>Changes</th>\n        </tr>\n      <thead>\n      <tbody>\n        {%
        for version in dc.qtn.versions|reverse %}\n          <tr>\n            <td
        class=\"version-name\">{{ version.name }}</td>\n            <td class=\"version-date\">{{
        version.created_at|datetime_format(\"%d %b %Y\") }}</td>\n            <td
        class=\"version-changes\">{{ version.description }}</td>\n          </tr>\n        {%
        else %}\n          <tr>\n            <td colspan=\"3\" class=\"no-versions\">There
        are no named versions</tr>\n          </tr>\n        {% endfor %}\n      </tbody>\n    </table>\n  </div>\n{%-
        endmacro -%}\n{%- macro renderContent() -%}\n  <main>\n    <section class=\"total-report\">\n      <h2>Summary
        Report</h2>\n      {{ renderReport(dc.report.total_report) }}\n\n      {%
        if dc.qtn.versions|length > 0 %}\n      <h2>History of Versions</h2>\n      {{
        renderVersionsOverview() }}\n      {% endif %}\n    </section>\n    {% for
        chapter in dc.km.chapters %}\n      {{ renderChapter(chapter, loop.index)
        }}\n    {% else %}\n      <p class=\"text-light\">No chapters</p>\n    {%
        endfor %}\n  </main>\n{%- endmacro -%}\n{# ------------------------------------------------------------------------------------
        #}\n{#  HTML TEMPLATE                                                                       #}\n{#
        ------------------------------------------------------------------------------------
        #}\n<html>\n  <head>\n    <title>{{ dc.config.service_name_short }} Questionnaire
        Report: {{dc.qtn.name}}</title>\n    <meta charset=\"utf-8\">\n    <link rel=\"preconnect\"
