        ~ \".\" ~ x) }}\n          {% else %}\n            No follow up questions\n          {%
        endfor %}\n        </div>\n      </div>\n    {% else %}\n      No answer items\n    {%
        endfor %}\n  </div>\n{%- endmacro -%}\n{%- macro renderAnswerChoiceList(question,
        reply, path, humanIdentifier) -%}\n  <div class=\"answer-block answer-items\"
        id=\"{{path}}\" data-path=\"{{path}}\" data-type=\"answer\">\n    <div class=\"choices-list\">\n    {%
        for choice in question.choices %}\n      {%- if choice in reply.choices %}\n        <div
        class=\"choice choice-selected\">\n          <svg aria-hidden=\"true\" focusable=\"false\"
        data-prefix=\"far\" data-icon=\"check-square\" class=\"svg-inline--fa fa-check-square
        fa-w-14\" role=\"img\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0
        448 512\"><path fill=\"currentColor\" d=\"M400 32H48C21.49 32 0 53.49 0 80v352c0
        26.51 21.49 48 48 48h352c26.51 0 48-21.49 48-48V80c0-26.51-21.49-48-48-48zm0
        400H48V80h352v352zm-35.864-241.724L191.547 361.48c-4.705 4.667-12.303 4.637-16.97-.068l-90.781-91.516c-4.667-4.705-4.637-12.303.069-16.971l22.719-22.536c4.705-4.667
        12.303-4.637 16.97.069l59.792 60.277 141.352-140.216c4.705-4.667 12.303-4.637
        16.97.068l22.536 22.718c4.667 4.706 4.637 12.304-.068 16.971z\"></path></svg>\n          {{
        choice.label }}\n        </div>\n      {%- else %}\n        <div class=\"choice
        choice-unselected\">\n          <svg aria-hidden=\"true\" focusable=\"false\"
        data-prefix=\"far\" data-icon=\"square\" class=\"svg-inline--fa fa-square
        fa-w-14\" role=\"img\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0
        448 512\"><path fill=\"currentColor\" d=\"M400 32H48C21.5 32 0 53.5 0 80v352c0
        26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V80c0-26.5-21.5-48-48-48zm-6 400H54c-3.3
        0-6-2.7-6-6V86c0-3.3 2.7-6 6-6h340c3.3 0 6 2.7 6 6v340c0 3.3-2.7 6-6 6z\"></path></svg>\n          {{
        choice.label }}\n        </div>\n      {%- endif %}\n    {% endfor %}\n    </div>\n  </div>\n{%-
        endmacro -%}\n{%- macro renderAnswerItemSelect(question, reply, path, humanIdentifier)
        -%}\n  <div class=\"answer-block answer-select\" id=\"{{path}}\" data-path=\"{{path}}\"
        data-type=\"answer\">\n    <p class=\"answer\">\n      <svg aria-hidden=\"true\"
        data-prefix=\"fas\" data-icon=\"check\" class=\"svg-inline--fa fa-check fa-w-16\"
        role=\"img\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 512 512\"><path
        fill=\"currentColor\" d=\"M173.898 439.404l-166.4-166.4c-9.997-9.997-9.997-26.206
        0-36.204l36.203-36.204c9.997-9.998 26.207-9.998 36.204 0L192 312.69 432.095
        72.596c9.997-9.997 26.207-9.997 36.204 0l36.203 36.204c9.997 9.997 9.997 26.206
        0 36.204l-294.4 294.401c-9.998 9.997-26.207 9.997-36.204-.001z\"></path></svg>\n      <a
        href=\"#item-{{ question.list_question_uuid }}-{{ reply.item_uuid }}\">{{
        reply.item_title }}</a>\n    </p>\n  </div>\n{%- endmacro -%}\n{%- macro renderAnswerFile(question,
        reply, path, humanIdentifier) -%}\n  <div class=\"answer-block answer-select\"
        id=\"{{path}}\" data-path=\"{{path}}\" data-type=\"answer\">\n    <p class=\"answer\">\n      {%
        if reply.file %}\n        <svg aria-hidden=\"true\" data-prefix=\"fas\" data-icon=\"check\"
        class=\"svg-inline--fa fa-check fa-w-16\" role=\"img\" xmlns=\"http://www.w3.org/2000/svg\"
        viewBox=\"0 0 512 512\"><path fill=\"currentColor\" d=\"M173.898 439.404l-166.4-166.4c-9.997-9.997-9.997-26.206
        0-36.204l36.203-36.204c9.997-9.998 26.207-9.998 36.204 0L192 312.69 432.095
        72.596c9.997-9.997 26.207-9.997 36.204 0l36.203 36.204c9.997 9.997 9.997 26.206
        0 36.204l-294.4 294.401c-9.998 9.997-26.207 9.997-36.204-.001z\"></path></svg>\n        <span><a
        href=\"{{ reply.file.download_url }}\" target=\"_blank\">{{ reply.file.name
        }}</a> ({{ reply.file.size|bytesize_format }})</span>\n      {% else %}\n        <svg
        aria-hidden=\"true\" data-prefix=\"fas\" data-icon=\"times\" class=\"svg-inline--fa
