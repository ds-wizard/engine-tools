      string: '{"content":"{#- ------------------------------------------------------------------------------------
        -#}\n{#-  VARIABLES                                                                           -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n{%- set dc = ctx|to_context_obj -%}\n{#- ------------------------------------------------------------------------------------
        -#}\n{#-  ANSWERS MACROS                                                                      -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n{%- macro renderAnswerValue(question, reply, path, humanIdentifier) %}\n{%-
        if reply is of_type(\"StringReply\") %}\n  {%- if question.value_type == \"UrlQuestionValueType\"
        %}\n    \\begin{itemize}\n      \\item[\\CheckmarkBold] \\url{ {{ reply.value
        }} }\n    \\end{itemize}\n  {%- else %}\n    \\begin{itemize}\n      \\item[\\CheckmarkBold]
        {{ reply.value }}\n    \\end{itemize}\n  {%- endif %}\n{% else %}\n\\begin{itemize}\n  \\item[\\CheckmarkBold]
        \n  \\begin{markdown}\n  {{ reply.value.split(\"![]\", 1)[0] }}\n  \\end{markdown}\n  {%
        if reply.is_legacy_integration -%}\n  {%- set integration = question.integration
        %}\n  \\href{{ \"{\" }}{{ integration.item(reply.item_id) }}{{ \"}\" }}{{
        \"{\" }}({{ integration.name }}: {{ reply.item_id }}){{ \"}\" }}\n  {% endif
        %}\n\\end{itemize}\n{% endif -%}\n{%- endmacro -%}\n{%- macro renderAnswerOption(question,
        reply, path, humanIdentifier) -%}\n{%- set hi = question.answers.index(reply.answer)
        -%}\n{%- set answer = reply.answer -%}\n{%- set path = path ~ \".\" ~ answer.uuid
        -%}\n{%- set humanIdentifier = humanIdentifier ~ \".\" ~ hi|of_alphabet %}\n\\begin{itemize}\n  \\item[\\CheckmarkBold]
        {{ hi|of_alphabet }}. {{ answer.label }}\n\\end{itemize}\n\n{% if answer.advice
        -%}\n\\noindent\n\\begin{markdown}\n{{answer.advice}}\n\\end{markdown}\n{%-
        endif %}\n\n{% if answer.followups|length > 0 -%}\n{%- set hiPrefix = humanIdentifier
        ~ \".\" -%}\n{%- for question in answer.followups -%}\n{%- set x = loop.index
        -%}\n{{ renderQuestion(question, path, hiPrefix ~ x, False) }}\n{%- endfor
        -%}\n{%- endif -%}\n{%- endmacro -%}\n{%- macro renderAnswerList(question,
        reply, path, humanIdentifier) -%}\n{%- set itemPathPrefix = path ~ \".\" -%}\n{%-
        set hiPrefix = humanIdentifier ~ \".\" -%}\n\\begin{itemize}\n  \\item[\\ArrowBoldDownRight]
        Answered with {{reply.items|length}} item{% if reply.items|length > 1 %}s{%
        endif %} as follows.\n\\end{itemize}\n{%- for i in reply.items -%}\n{%- set
        itemPath = itemPathPrefix ~ i -%}\n{%- set itemHumanIdentifier = hiPrefix
        ~ (loop.index - 1)|of_alphabet -%}\n% Answer item: {{itemPath}}\n\n{%- for
        question in question.followups -%}\n  {%- set x = loop.index -%}\n{{ renderQuestion(question,
        itemPath, itemHumanIdentifier ~ \".\" ~ x, False) }}\n{% else -%}\n  \\textit{No
        follow up questions}\n{% endfor %}\n{% endfor %}\n{%- endmacro -%}\n{%- macro
        renderAnswerChoiceList(question, reply, path, humanIdentifier) -%}\n{%- if
        question.choices|length > 0 -%}\n\\begin{itemize}\n{%- for choice in question.choices
        -%}\n{%- if choice in reply.choices %}\n  \\item[\\CheckmarkBold] {{ choice.label
        }}\n{%- else %}\n  \\item[\\XSolidBrush] {{ choice.label }}\n{%- endif -%}\n{%-
        endfor %}\n\\end{itemize}\n{%- endif %}\n{%- endmacro -%}\n{%- macro renderAnswerItemSelect(question,
        reply, path, humanIdentifier) -%}\n\\begin{itemize}\n  \\item[\\CheckmarkBold]
        {{ reply.item_title }}\n\\end{itemize}\n{%- endmacro -%}\n{%- macro renderAnswerFile(question,
        reply, path, humanIdentifier) -%}\n\\begin{itemize}\n{% if reply.file %}\n  \\item[\\CheckmarkBold]
        \\href{{ \"{\" }}{{ reply.file.download_url }}{{ \"}\" }}{{ \"{\" }}{{ reply.file.name
        }}{{ \"}\" }} ({{ reply.file.size|bytesize_format }})\n{% else %}\n  \\item[\\XSolidBrush]
        \\textit{The file has been deleted}\n{% endif %}\n\\end{itemize}\n{%- endmacro
        -%}\n{#- ------------------------------------------------------------------------------------
        -#}\n{#-  QUESTION REPLY MACROS                                                               -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n{%- macro renderQuestionReply(question, path, humanIdentifier) -%}\n  {%-
        set isRequired = question.is_required -%}\n  {%- set reply = question.replies.get(path)
        -%}\n  {%- if reply and reply.value -%}\n    {%- if question is of_type(\"ValueQuestion\")
        and reply is of_type(\"StringReply\") -%}  {# odend8ni value.#}\n      {{
        renderAnswerValue(question, reply, path, humanIdentifier) }}\n    {%- elif
        question is of_type(\"OptionsQuestion\") and reply is of_type(\"AnswerReply\")
        -%}\n      {{ renderAnswerOption(question, reply, path, humanIdentifier) }}\n    {%-
        elif question is of_type(\"ListQuestion\") and reply is of_type(\"ItemListReply\")
        -%}\n      {{ renderAnswerList(question, reply, path, humanIdentifier) }}\n    {%-
        elif question is of_type(\"IntegrationQuestion\") and reply is of_type(\"IntegrationReply\")
        -%}\n      {{ renderAnswerValue(question, reply, path, humanIdentifier) }}\n    {%-
        elif question is of_type(\"MultiChoiceQuestion\") and reply is of_type(\"MultiChoiceReply\")
        -%}\n      {{ renderAnswerChoiceList(question, reply, path, humanIdentifier)
        }}\n    {% elif question is of_type(\"ItemSelectQuestion\") and reply is of_type(\"ItemSelectReply\")
        %}\n      {{ renderAnswerItemSelect(question, reply, path, humanIdentifier)
        }}\n    {% elif question is of_type(\"FileQuestion\") and reply is of_type(\"FileReply\")
        %}\n      {{ renderAnswerFile(question, reply, path, humanIdentifier) }}\n    {%-
        endif -%}\n  {% else %}\n\\begin{itemize}\n  \\item[{% if isRequired %}\\textcolor{colorReqQ}{%
        endif %}\\XSolidBrush] \\textit{This question has not been answered yet!}\n\\end{itemize}\n  {%
        endif -%}\n{%- endmacro -%}\n{#- ------------------------------------------------------------------------------------
        -#}\n{#-  QUESTION EXTRAS MACRO                                                               -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n{%- macro renderQuestionExtras(question) -%}\n  {%- set resourcePageReferences
        = question.resource_page_references -%}\n  {%- set urlReferences = question.url_references
        -%}\n  {%- set tags = question.tags -%}\n  {%- set experts = question.experts
        -%}\n  {%- if resourcePageReferences|length > 0 or urlReferences|length >
        0 or tags|length > 0 or experts|length > 0 %}\n\\begin{itemize}\n  {%- if
        tags|length > 0 %}\n  \\item \\textit{Tags}: {% for tag in tags %}{% set color
        = tag.color[1:] if tag.color[0] == \"#\" else tag.color %}\\setulcolor{{ \"{\"
        }}{{color}}{{ \"}\" }}\\ul{{ \"{\" }}{{tag.name}}{{ \"}\" }}{% if not loop.last%},
        {% endif %}{% endfor %}\n  {% endif %}\n  {%- if resourcePageReferences|length
        > 0 %}\n  \\item \\textit{Resource Pages}: {% for reference in resourcePageReferences
        -%}\n  {%- if reference.resource_page_uuid and reference.resource_page and
        reference.resource_page.collection -%}\n    {%- set resourcePageLink = dc.config.client_url
        ~ ''/knowledge-models/'' ~ dc.package.id ~ ''/resource-pages/'' ~ reference.resource_page.uuid
        -%}\n    \\href{{ \"{\" }}{{ resourcePageLink }}{{ \"}\" }}{{ \"{\" }}{{ reference.resource_page.collection.title
        }} - {{ reference.resource_page.title }}{{ \"}\" }}\n    {%- if not loop.last
        -%}, {% endif -%}{%- endif -%}{%- endfor -%}\n  {%- endif -%}\n  {%- if urlReferences|length
        > 0 %}\n  \\item \\textit{External Links}: {% for reference in urlReferences
        -%}\n    \\href{{ \"{\" }}{{ reference.url }}{{ \"}\" }}{{ \"{\" }}{{ reference.label
        }}{{ \"}\" }}\n    {%- if not loop.last -%}, {% endif -%}{%- endfor -%}\n  {%-
        endif -%}\n  {% if experts|length > 0 %}\n  \\item \\textit{Experts}: {% for
        expert in experts -%}\n    {{expert.name}} $\\langle$\\href{{ \"{\" }}mailto:{{
        expert.email }}{{ \"}\" }}{{ \"{\" }}{{ expert.email }}{{ \"}\" }}$\\rangle$\n    {%-
        if not loop.last -%}, {% endif -%}{%- endfor -%}\n  {%- endif -%}\n\\end{itemize}\n  {%-
        endif -%}\n{%- endmacro -%}\n{#- ------------------------------------------------------------------------------------
        -#}\n{#-  QUESTION MACROS                                                                     -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n{%- macro renderQuestion(question, path, humanIdentifier, topLevel) -%}\n{%-
        set path = path ~ \".\" ~ question.uuid -%}\n{% if topLevel %}\n\\section*{{
        \"{\" }}\\protect\\textcolor{colorSecId}{{ \"{\" }}{{humanIdentifier}}{{ \"}\"
        }} {{question.title}}{{ \"}\" }}\n{% else %}\n\\subsection*{{ \"{\" }}\\protect\\textcolor{colorSecId}{{
        \"{\" }}{{humanIdentifier}}{{ \"}\" }} {{question.title}}{{ \"}\" }}\n{% endif
        %}\n\\label{{ \"{\" }}{{path}}{{ \"}\" }}\n% uuid: {{question.uuid}}\n% path:
        {{path}}\n\n{{ renderQuestionExtras(question) }}\n\n{% if question.text %}\n\\noindent\n\\begin{markdown}\n{{question.text}}\n\\end{markdown}\n{%
        endif %}\n\n{{ renderQuestionReply(question, path, humanIdentifier) }}\n\n{%-
        endmacro -%}\n{#- ------------------------------------------------------------------------------------
        -#}\n{#-  REPORT MACROS                                                                       -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n{%- macro progressBar(value) -%}\n{%- set color = \"colorBarAwful\" -%}\n{%-
        if value > 0.95 -%}\n  {%- set color = \"colorBarAwesome\" -%}\n{%- elif value
        > 0.8 -%}\n  {%- set color = \"colorBarNice\" -%}\n{%- elif value > 0.6 -%}\n  {%-
        set color = \"colorBarGood\" -%}\n{%- elif value > 0.4 -%}\n  {%- set color
        = \"colorBarAverage\" -%}\n{%- elif value > 0.2 -%}\n  {%- set color = \"colorBarBad\"
        -%}\n{%- endif -%}\n\\progressbar[subdivisions=10,width=15em,heighta=10pt,filledcolor={{color}}]{{
        \"{\" }}{{value}}{{ \"}\" }}\n{%- endmacro -%}\n{%- macro renderReport(report)
        -%}\n\\begin{table}[h]\n  \\centering\n  \\begin{tabular}{ l c r }\n{%- for
        item in report.indications %}\n    Answered {% if item.is_for_phase %}(current
        phase){% endif %} & {{item.answered}} / {{item.total}} & {{ progressBar(item.percentage)
        }} \\\\\n{%- endfor %}\n    & & \\\\ \\hline\n    & & \\\\\n{%- if report.metrics|length
        > 0 %}\n{%- for item in report.metrics %}\n    {{item.metric.title}} & {{
        \"%.2f\"|format(item.measure) }} & {{ progressBar(item.measure) }} \\\\\n{%-
        endfor -%}\n{%- endif %}\n  \\end{tabular}\n\\end{table}\n{%- endmacro -%}\n{%-
        macro renderVersions() -%}\n{% if dc.qtn.versions|length > 0 %}\n\\section*{History
        of Versions}\n\n\\begin{table}[h]\n\t\\centering\n\t\\begin{tabular}{ c c
        p{0.6\\linewidth} }\n\t\tVersion & Date & Description \\\\ \\hline\\hline\\Tstrut\n{%-
        for version in dc.qtn.versions|reverse %}\n\t\t{{ version.name }}  & {{ version.created_at|datetime_format(\"%d
        %b %Y\") }} & {{ version.description }} \\\\ \\hline\\Tstrut\n{%- endfor %}\n  \\end{tabular}\n\\end{table}\n{%
        endif %}\n{%- endmacro -%}\n{#- ------------------------------------------------------------------------------------
        -#}\n{#-  INTRODUCTION                                                                        -#}\n{#-
        ------------------------------------------------------------------------------------
        -#}\n\\documentclass[a4paper,12pt]{report}\n\\usepackage[utf8]{inputenc}\n\\usepackage[english]{babel}\n\n\\usepackage{geometry}\n\\geometry{\n\ta4paper,\n\tleft=20mm,\n\ttop=20mm,\n\tbottom=20mm,\n\tright=20mm,\n}\n\n\\usepackage{bbding}\n\\usepackage{color}\n\\usepackage{xcolor}\n\\usepackage{soul}\n\\usepackage{hyperref}\n\\usepackage[hashEnumerators,smartEllipses]{markdown}\n\\usepackage{progressbar}\n\\usepackage{xurl}\n\n\\renewcommand{\\thechapter}{\\Roman{chapter}}\n\n\\setul{0.3ex}{0.3ex}\n\n%
        Custom colors\n\\definecolor{colorSecId}{HTML}{0060c7}\n\\definecolor{colorReqQ}{HTML}{FF0000}\n%
        Progress bar colors\n\\definecolor{colorBarAwful}{HTML}{DC3545}\n\\definecolor{colorBarBad}{HTML}{EA6D2C}\n\\definecolor{colorBarAverage}{HTML}{D4BC13}\n\\definecolor{colorBarGood}{HTML}{A9B720}\n\\definecolor{colorBarNice}{HTML}{7EB12C}\n\\definecolor{colorBarAwesome}{HTML}{28A745}\n%
        Colors for tags (underline)\n{%- for tag in dc.km.tags -%}\n{%- set color
        = tag.color[1:] if tag.color[0] == \"#\" else tag.color %}\n\\definecolor{{
        \"{\" }}{{color}}{{ \"}\" }}{HTML}{{ \"{\" }}{{color}}{{ \"}\" }}\n{%- endfor
        %}\n\n% Strut for table\n\\newcommand\\Tstrut{\\rule{0pt}{2.6ex}}\n\n\\begin{document}\n\n\\begin{titlepage}\n    \\begin{center}\n        \\vspace*{1cm}\n            \n        \\Huge\n        \\textbf{{
        \"{\" }}{{dc.qtn.name}}{{ \"}\" }}\n            \n        \\vspace{0.5cm}\n        \\LARGE\n        Questionnaire
        Report \n            \n        \\vspace{1.5cm}\n            \n{%- if dc.qtn.created_by
        %}\n        \\Large\n        \\textbf{{ \"{\" }}{{dc.qtn.created_by.first_name}}
        {{dc.qtn.created_by.last_name}}{{ \"}\" }}\\\\\n        {{dc.qtn.created_by.email}}\n{%-
        endif %}\n        \\vspace{1.5cm}\n\n        \\normalsize\n        Based on\\\\\n        {{dc.pkg.name}},
        {{dc.pkg.version}}\\\\\n        \\texttt{{\"{\"}}{{dc.pkg.org_id}}:{{dc.pkg.km_id}}:{{dc.pkg.version}}{{\"}\"}}\\\\\n        {%-
        for version in dc.qtn.versions if version.uuid == dc.qtn.version %}\n        \\vspace{0.5cm}\n        Version:
        {{ version.name }} ({{ version.created_at|datetime_format(\"%d %b %Y %H:%M:%S\")
        }} UTC)\\\\\n        {%- endfor %}\n        {%- if dc.current_phase %}\n        \\vspace{0.5cm}\n        Project
        phase: {{dc.current_phase.title}}\\\\\n        {%- endif %}\n        {%- if
        dc.qtn.project_tags|length > 0 %}\n        \\vspace{0.25cm}\n        Project
        tags: {% for tag in dc.qtn.project_tags %}{{ tag }}{% if not loop.last %},
        {% endif %}{% endfor %}\\\\\n        {%- endif %}\n        {%- if dc.qtn.description
        %}\n        \\vspace{0.25cm}\n        Description: {{ dc.qtn.description }}\\\\\n        {%-
        endif %}\n            \n        \\vfill\n            \n        \\Large\n        {{
        \"{\" }}{{ dc.doc.created_at|datetime_format(\"%d %b %Y\") }}{{ \"}\" }}\n            \n        \\vspace{0.8cm}\n        \n        \\normalsize\n        Document
        generated by \\href{{ \"{\" }}{{ dc.config.service_url }}{{ \"}\" }}{{ \"{\"
