        32.2 12.28 44.48 0l22.24-22.24c12.28-12.28 12.28-32.19 0-44.48L242.72 256z\"></path></svg>\n        <span>The
        file has been deleted</span>\n      {% endif %}\n    </p>\n  </div>\n{%- endmacro
        -%}\n{# ------------------------------------------------------------------------------------
        #}\n{#  QUESTION MACROS                                                                     #}\n{#
        ------------------------------------------------------------------------------------
        #}\n{%- macro questionClasses(question) -%}\n  \"question {{ \"required\"
        if question.is_required else \"optional\"}} {{  (\"phase-\" ~ question.required_phase.order)
        if question.required_phase else \"phase-none\" }}\"\n{%- endmacro -%}\n{%-
        macro renderQuestionExtras(question) -%}\n  <div class=\"extra-data\">\n    {#
        Question - References - Resource Page References #}\n    {{ renderResourcePageReferences(question)
        }}\n    {# Question - References - URL References #}\n    {{ renderURLReferences(question)
        }}\n    {# Question - Experts #}\n    {{ renderExperts(question) }}\n  </div>\n{%-
        endmacro -%}\n{%- macro renderQuestionReply(question, path, humanIdentifier)
        -%}\n  {# Question - Answers #}\n  {% set reply = question.replies.get(path)
        %}\n  {% if reply and reply.value %}\n    {% if question is of_type(\"ValueQuestion\")
        and reply is of_type(\"StringReply\") %}\n      {{ renderAnswerValue(question,
        reply, path, humanIdentifier) }}\n    {% elif question is of_type(\"OptionsQuestion\")
        and reply is of_type(\"AnswerReply\") %}\n      {{ renderAnswerOption(question,
        reply, path, humanIdentifier) }}\n    {% elif question is of_type(\"ListQuestion\")
        and reply is of_type(\"ItemListReply\") %}\n      {{ renderAnswerList(question,
        reply, path, humanIdentifier) }}\n    {% elif question is of_type(\"IntegrationQuestion\")
        and reply is of_type(\"IntegrationReply\") %}\n      {{ renderAnswerValue(question,
        reply, path, humanIdentifier) }}\n    {% elif question is of_type(\"MultiChoiceQuestion\")
        and reply is of_type(\"MultiChoiceReply\") %}\n      {{ renderAnswerChoiceList(question,
        reply, path, humanIdentifier) }}\n    {% elif question is of_type(\"ItemSelectQuestion\")
        and reply is of_type(\"ItemSelectReply\") %}\n      {{ renderAnswerItemSelect(question,
        reply, path, humanIdentifier) }}\n    {% elif question is of_type(\"FileQuestion\")
        and reply is of_type(\"FileReply\") %}\n      {{ renderAnswerFile(question,
        reply, path, humanIdentifier) }}\n    {% endif %}\n  {% else %}\n    <div
        class=\"answer-block not-answered\">\n      <p class=\"no-answer\">\n        <svg
        aria-hidden=\"true\" data-prefix=\"fas\" data-icon=\"times\" class=\"svg-inline--fa
        fa-times fa-w-11\" role=\"img\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0
        0 352 512\"><path fill=\"currentColor\" d=\"M242.72 256l100.07-100.07c12.28-12.28
        12.28-32.19 0-44.48l-22.24-22.24c-12.28-12.28-32.19-12.28-44.48 0L176 189.28
        75.93 89.21c-12.28-12.28-32.19-12.28-44.48 0L9.21 111.45c-12.28 12.28-12.28
        32.19 0 44.48L109.28 256 9.21 356.07c-12.28 12.28-12.28 32.19 0 44.48l22.24
        22.24c12.28 12.28 32.2 12.28 44.48 0L176 322.72l100.07 100.07c12.28 12.28
        32.2 12.28 44.48 0l22.24-22.24c12.28-12.28 12.28-32.19 0-44.48L242.72 256z\"></path></svg>\n        <span>This
        question has not been answered yet!</span>\n      </p>\n    </div>\n  {% endif
        %}\n{%- endmacro -%}\n{%- macro renderQuestion(question, path, humanIdentifier)
        -%}\n  {% set path = path ~ \".\" ~ question.uuid %}\n  <div class={{questionClasses(question)}}
        id=\"{{path}}\" data-uuid=\"{{question.uuid}}\" data-type=\"question\">\n    <div
        class=\"question-header\">\n      <h4 class=\"title\">\n        <strong class=\"human-identifier\">{{humanIdentifier}}</strong>\n        {{question.title}}\n      </h4>\n      \n      {%
        if question.tags|length > 0 %}\n      <div class=\"tags\">\n        {% for
        tag in question.tags %}\n          <span class=\"tag\" style=\"background-color:{{tag.color}}\">{{tag.name}}</span>\n        {%
        endfor %}\n      </div>\n      {% endif %}\n    </div>\n\n    <div class=\"text\">\n      {{question.text|markdown}}\n    </div>\n\n    {{
        renderQuestionExtras(question) }}\n\n    {{ renderQuestionReply(question,
        path, humanIdentifier) }}\n  </div>\n{%- endmacro -%}\n{# ------------------------------------------------------------------------------------
        #}\n{#  CHAPTER MACROS                                                                      #}\n{#
        ------------------------------------------------------------------------------------
        #}\n{%- macro renderReport(report) -%}\n  <section class=\"report\">\n    <h3
        class=\"title\">Summary</h3>\n    <div class=\"indications\">\n      <table>\n        <tbody>\n          {%
        for item in report.indications %}\n            <tr>\n              <td class=\"table-label\">Answered
        {% if item.is_for_phase %}(current phase){% endif %}</td>\n              <td>{{item.answered}}
        / {{item.total}} </td>\n              <td class=\"progress-cell\">\n                <div
        class=\"progress\">\n                  <div class=\"progress-fill\" style=\"width:{{100
        * item.percentage}}%\">\n                  </div>\n                </div>\n              </td>\n            </tr>\n          {%
        endfor %}\n        </tbody>\n      </table>\n    </div>\n    {% if report.metrics|length
        > 0 %}\n    <div class=\"metrics\">\n        <table>\n          <thead><tr><th>Metric</th><th
        colspan=\"2\">Score</th></tr></thead>\n          <tbody>\n            {% for
        item in report.metrics %}\n              <tr>\n                <td class=\"table-label\">\n                  {{item.metric.title}}\n                </td>\n                <td>{{
        \"%.2f\"|format(item.measure) }}</td>\n                <td class=\"progress-cell\">\n                  <div
        class=\"progress\">\n                    <div class=\"progress-fill bg-value-{{(item.measure
        * 10)|int}}0\" style=\"width:{{100 * item.measure}}%\">\n                    </div>\n                  </div>\n                </td>\n              </tr>\n            {%
        endfor %}\n          </tbody>\n        </table>\n    </div>\n    {% endif
        %}\n  </section>\n{%- endmacro -%}\n{%- macro renderChapter(chapter, humanIdentifier)
        -%}\n      <section class=\"chapter\" id=\"{{chapter.uuid}}\" data-uuid=\"{{chapter.uuid}}\"
        data-type=\"chapter\">\n        <h2 class=\"title\">{{humanIdentifier|roman}}.
        {{chapter.title}}</h2>\n        <p class=\"text-light\">{{chapter.text|markdown}}</p>\n\n        {%
        for chapterReport in chapter.reports %}\n          {{ renderReport(chapterReport)
