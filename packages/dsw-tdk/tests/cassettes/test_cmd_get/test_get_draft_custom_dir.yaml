        100%;\n    padding-top: 1rem;\n    vertical-align: top;\n    font-family:
        \"Open Sans\", sans-serif;\n    font-size: 10pt;\n  }\n  @bottom-center {\n    border-top:
        1px solid black;\n    content: '''';\n    display: block;\n    width: 100%;\n    padding-top:
        1rem;\n    vertical-align: top;\n    font-family: \"Open Sans\", sans-serif;\n    font-size:
        10pt;\n  }\n  @bottom-center {\n    border-top: 1px solid black;\n    content:
        counter(page) \" / \" counter(pages);\n    display: block;\n    width: 100%;\n    padding-top:
        1rem;\n    vertical-align: top;\n    font-family: \"Open Sans\", sans-serif;\n    font-size:
        10pt;\n  }\n}\n@page :blank {\n  @top-center { content: none }\n  @bottom-left
        { content: none }\n  @bottom-center { content: none }\n  @bottom-right { content:
        none }\n}\n@page :first {\n  @top-center { content: none }\n  @bottom-left
        { content: none }\n  @bottom-center { content: none }\n  @bottom-right { content:
        none }\n}\n\nh1, h2, h3, h4, h5, h6 {\n  page-break-inside: avoid !important;\n  page-break-after:
        avoid !important;\n}\n\nbody {\n  max-width: 21cm;\n  margin: auto;\n  font-family:
        \"Open Sans\", sans-serif;\n  font-size: 10pt;\n  line-height: 1.5;\n}\n\nh1
        {\n  font-size: 22pt;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  color: #333;\n}\n\na
        {\n  color: #049;\n}\n\n.text-light {\n  color: #868e96!important;\n}\n\n.text-muted
        {\n  color: #AEA79F!important;\n}\n\ntable {\n  width: 100%;\n}\n\n\n/* Front
        page */\n\nheader {\n  height: 25cm;\n  position: relative;\n}\n\nheader h1
        {\n  padding: 7rem 0 4rem 0;\n}\n\nheader .dmp-data {\n  margin-top: 5rem;\n  width:
        100%;\n}\n\nheader .dmp-data td, header .dmp-data th {\n  text-align: left;\n  padding:
        0.5rem 0;\n}\n\nheader .dmp-data th {\n  min-width: 9em;\n}\n\nheader .dmp-data
        .project-tag {\n  background-color: #6c757d;\n  margin-bottom: 0.25rem;\n}\n\nheader
        .tool-info {\n  text-align: center;\n  margin: 0;\n  padding-top: 2rem;\n  color:
        #868e96;\n  position: absolute;\n  bottom: 0;\n  width: 100%;\n}\n\nheader
        .tool-info svg {\n  height: 3rem;\n  display: block;\n  margin: auto;\n}\n\n\n/*
        Total report section */\n\n.total-report {\n  page-break-after: always;\n}\n\n/*
        Metrics and indications report */\n\n.report {\n  margin-top: 1rem;\n  margin-bottom:
        3rem;\n  background: #eee;\n  border-radius: .5rem;\n  padding: 1rem;\n}\n\n.report
        h3 {\n  margin-top: 0;\n}\n\n.report table {\n  border-spacing: 0 .5rem;\n}\n\n.report
        .metrics {\n  margin-top: 1rem;\n}\n\n.report .metrics table th {\n  text-align:
        left;\n  padding: 0;\n}\n\n.report .table-label {\n  width: 40%;\n}\n\n.report
        .progress-cell {\n  width: 50%;\n}\n\n.report .progress {\n  position: relative;\n  height:
        .75rem;\n  background: #ddd;\n  border-radius: .25rem;\n}\n\n.report .progress-fill
        {\n  position: absolute;\n  left: 0;\n  height: 100%;\n  background: #17a2b8;\n  border-radius:
        .25rem;\n}\n\n.report .progress-fill.bg-value-100 {\n  background:#28a745;\n}\n\n.report
        .progress-fill.bg-value-90 {\n  background:#53ac39;\n}\n\n.report .progress-fill.bg-value-80
        {\n  background:#7eb12c;\n}\n\n.report .progress-fill.bg-value-70 {\n  background:#a9b720;\n}\n\n.report
        .progress-fill.bg-value-60 {\n  background:#d4bc13;\n}\n\n.report .progress-fill.bg-value-50
        {\n  background:#ffc107;\n}\n\n.report .progress-fill.bg-value-40 {\n  background:#f8a513;\n}\n  \n.report
        .progress-fill.bg-value-30 {\n  background:#f18920;\n}\n\n.report .progress-fill.bg-value-20
        {\n  background:#ea6d2c;\n}\n\n.report .progress-fill.bg-value-10 {\n  background:#e35139;\n}\n\n.report
        .progress-fill.bg-value-0 {\n  background:#dc3545;\n}\n\n\n/* Chapter */\n\n.chapter
        {\n  page-break-before: always;\n  margin-bottom: 5rem;\n}\n\n\n/* Question
        */\n\n.question:not(:last-child) {\n  padding-bottom: 3rem;\n}\n\n.answer-item:not(:last-child)
        {\n  margin-bottom: 3rem;\n}\n\n.question, .answer-item {\n  border-left:
        5px solid #eee;\n  padding-left: 1rem\n}\n\n.followups {\n  margin-top: 2rem;\n}\n\n.answer-item
        > .followups > .question, .questions > .question {\n  border: none;\n  padding-left:
        0;\n}\n\n.question-header h4 {\n  margin-top: 0;\n  margin-bottom: 0.5rem;\n  font-weight:
        bold;\n  background: #eee;\n  padding: 1rem;\n  border-radius: 0.5rem;\n}\n\n.question
        .title .human-identifier {\n  display: block;\n  margin-bottom: 0.25rem;\n  font-size:
        8pt;\n}\n\n.question .question-header {\n  page-break-inside: avoid;\n}\n\n.question
        .tag,\n.dmp-data .tag {\n  padding: .125rem 0.5rem;\n  color: #fff;\n  font-size:
        8pt;\n  font-weight: bold;\n  border-radius: 0.25rem;\n  margin-right: 0.25rem;\n}\n\n.question
        .text {\n  margin-top: 0;\n  margin-bottom: 0.75rem;\n  color: #6c757d;\n  page-break-inside:
        avoid !important;\n}\n\n.question > .extra-data {\n  margin-bottom: 0.75rem;\n  color:
        #6c757d;\n}\n\n.question b {\n  font-weight: normal;\n}\n\n.advice {\n  background:
        #d1ecf1;\n  padding: 1rem;\n  border-radius: 0.5rem;\n  color: #0c5460;\n  margin:
        1rem 0;\n}\n\n.advice > *:first-child {\n  margin-top: 0;\n}\n\n.advice >
        *:last-child {\n  margin-bottom: 0;\n}\n\n\n/* Experts and references */\n.experts,
        .references {\n  color: #868e96;\n  line-height: 1.5;\n}\n\n.experts b, .reference
        b,\n.experts a, .reference a {\n  vertical-align: middle;\n}\n\n.experts svg,
        .references svg {\n  width: 13px;\n  height: 14px;\n  margin-right: 7px;\n  vertical-align:
        middle;\n  color: #495057;\n}\n\n.expert::after, .reference::after {\n  content:
        \",\";\n}\n\n.expert:last-of-type::after, .reference:last-of-type::after {\n  content:
        \" \";\n}\n\n\n/* Answers */\n\n.choices-list {\n  list-style-type: none;\n}\n\n.choices-list
        .choice {\n  display: flex;\n  align-items: center;\n}\n\n.choices-list .choice.choice-unselected
        {\n  color: gray;\n}\n\n.answer p, .no-answer p {\n  margin: 0;\n}\n\n.answer-block
        .answer span {\n  vertical-align: middle;\n}\n\n.answer-block .answer svg,\n.no-answer
        svg,\n.choice svg {\n  height: 20px;\n  width: 20px;\n  margin-right: 0.3rem;\n  vertical-align:
        middle;\n}\n\n.no-answer {\n  font-style: italic;\n}\n\n.no-answer span {\n  vertical-align:
        middle;\n}\n\n.question.required .no-answer {\n  color: #D0021B;\n}\n\n.integration-link
        {\n  display: flex;\n  align-items: center;\n}\n\n.integration-link img {\n  max-height:
        2rem;\n  margin-right: .5rem;\n}\n\n.metrics > p {\n  font-style: italic;\n  margin-top:
        0;\n}\n\n\n/* Versions */\ndiv#versions table {\n  width: 100%;\n  border-collapse:
        collapse;\n}\n\ndiv#versions table,\ndiv#versions td,\ndiv#versions th {\n  border:
        1px solid #868e96;\n}\n\ndiv#versions td,\ndiv#versions th {\n  padding: 0.2em;\n}\n\ndiv#versions
        th.title {\n  text-transform: uppercase;\n}\n\ndiv#versions td.version-name
        {\n  text-align: center;\n  word-wrap: break-word;\n}\n\ndiv#versions td.version-date
        {\n  text-align: center;\n  width: 18ex;\n}\n\ndiv#versions td.version-changes
        {\n  word-wrap: break-word;\n}\n\ndiv#versions td.no-versions {\n  font-style:
        italic;\n  padding: 1em;\n  text-align: center;\n}\n\n/* Resource collections
        and pages */\n.resource-collection {\n  margin-left: .5rem;\n}\n.resource-page
        {\n  margin-left: .5rem;\n}\n.resource-page-content {\n  margin-top: 1rem;\n  margin-bottom:
        3rem;\n  background: #eee;\n  border-radius: .5rem;\n  padding: 1rem;\n}\n.resource-page-content-book-ack
        {\n  display: flex; /* Use flexbox for layout */\n  flex-wrap: wrap; /* Allow
        items to wrap onto a new line */\n  align-items: center; /* Center items vertically
        */\n}\n.resource-page-content img{\n  max-width: 100%;\n}\n.resource-page-content-book-ack
        img{\n  max-width: 100%;\n  vertical-align: middle;\n  margin-right: 0.5rem;\n}","createdAt":"2026-02-24T06:15:04.732945Z","documentTemplateUuid":"7e4da640-82ba-40cb-a072-288112911fba","fileName":"src/default.css","tenantUuid":"00000000-0000-0000-0000-000000000000","updatedAt":"2026-02-24T06:15:04.732945Z","uuid":"67f69cc2-0c3a-4557-84b7-aade39de4b26"}'
