name: Code Style

on:
  push:

jobs:
  # CSpell
  cspell:
    name: CSpell
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install CSpell
      run: |
        npm install -g cspell @cspell/dict-python

    - name: Run CSpell
      run: |
        cspell \
          --no-progress \
          --no-summary \
          --config .cspell/cspell.json \
          packages/**/*.py \
          packages/**/*.md \
          packages/**/*.json \
          packages/**/*.toml \
          packages/**/*.yml \
          packages/**/*.yaml

  # Ruff
  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Create build info
      run: |
        bash scripts/build-info.sh

    - name: Install the project
      run: uv sync --locked --all-extras --all-packages --no-install-project --dev

    - name: Run Ruff
      run: |
        uv run ruff check

  # Ty
  ty:
    name: Ty
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Create build info
      run: |
        bash scripts/build-info.sh

    - name: Install the project
      run: uv sync --locked --all-extras --all-packages --no-install-project --dev

    - name: Run Ruff
      run: |
        uv run ty check
